<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Auth System</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/x-icon" href="logo/logo1.ico?v=1" />
    <link rel="shortcut icon" type="image/x-icon" href="logo/logo1.ico?v=1" />

    <!-- Meta tags for social media sharing (Open Graph) -->
    <meta property="og:title" content="Auth System - Secure Login" />
    <meta
      property="og:description"
      content="A secure authentication system with OTP verification."
    />
    <meta
      property="og:image"
      content="https://signin-portal.vercel.app/logo/logo1.png"
    />
    <meta property="og:url" content="https://signin-portal.vercel.app/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Auth System - Secure Login" />
    <meta
      name="twitter:description"
      content="A secure authentication system with OTP verification."
    />
    <meta
      name="twitter:image"
      content="https://signin-portal.vercel.app/logo/logo1.png"
    />
  </head>
  <body data-page="index">
    <div class="auth-container dashboard-content">
      <h1 id="dashboard-welcome" class="dashboard-title">Dashboard</h1>
      <p id="dashboard-subtitle" class="dashboard-subtitle">
        Loading your account details...
      </p>
      <p id="dashboard-status" class="auth-subtitle"></p>

      <button
        id="logout-button"
        class="primary-button"
        style="margin-top: 1.2rem"
      >
        Logout
      </button>
    </div>

    <script src="js/auth.js"></script>
  </body>
</html>

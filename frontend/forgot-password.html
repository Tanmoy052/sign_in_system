<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - Auth System</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/x-icon" href="logo/logo1.ico?v=1" />
    <link rel="shortcut icon" type="image/x-icon" href="logo/logo1.ico?v=1" />

    <!-- Meta tags for social media sharing (Open Graph) -->
    <meta property="og:title" content="Auth System - Secure Login" />
    <meta
      property="og:description"
      content="A secure authentication system with OTP verification."
    />
    <meta
      property="og:image"
      content="https://signin-portal.vercel.app/logo/logo1.png"
    />
    <meta property="og:url" content="https://signin-portal.vercel.app/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Auth System - Secure Login" />
    <meta
      name="twitter:description"
      content="A secure authentication system with OTP verification."
    />
    <meta
      name="twitter:image"
      content="https://signin-portal.vercel.app/logo/logo1.png"
    />
  </head>
  <body data-page="forgot-password">
    <div class="auth-container">
      <h1 class="auth-title">Forgot your password?</h1>
      <p class="auth-subtitle">
        Enter your email and we'll send you a secure OTP to reset it.
      </p>

      <form id="forgot-password-form" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="you@example.com"
            required
          />
        </div>

        <div id="forgot-status" class="status-message"></div>

        <button type="submit" class="primary-button">Send reset code</button>
      </form>

      <div class="auth-footer">
        Remember your password?
        <a href="login.html" class="secondary-link">Back to sign in</a>
      </div>
    </div>

    <script src="js/auth.js"></script>
  </body>
</html>

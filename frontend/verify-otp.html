<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify OTP - Auth System</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/x-icon" href="logo/logo1.ico?v=1" />
    <link rel="shortcut icon" type="image/x-icon" href="logo/logo1.ico?v=1" />

    <!-- Meta tags for social media sharing (Open Graph) -->
    <meta property="og:title" content="Auth System - Secure Login" />
    <meta
      property="og:description"
      content="A secure authentication system with OTP verification."
    />
    <meta
      property="og:image"
      content="https://signin-portal.vercel.app/logo/logo1.png"
    />
    <meta property="og:url" content="https://signin-portal.vercel.app/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Auth System - Secure Login" />
    <meta
      name="twitter:description"
      content="A secure authentication system with OTP verification."
    />
    <meta
      name="twitter:image"
      content="https://signin-portal.vercel.app/logo/logo1.png"
    />
  </head>
  <body data-page="verify-otp">
    <div class="auth-container">
      <h1 class="auth-title">Verify your code</h1>
      <p class="auth-subtitle">Enter the 6-digit code sent to your email.</p>

      <form id="verify-otp-form" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="verify-email">Email</label>
          <input
            type="email"
            id="verify-email"
            name="email"
            class="form-input"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="otp">Verification code</label>
          <input
            type="text"
            id="otp"
            name="otp"
            class="form-input otp-input"
            placeholder="123456"
            maxlength="6"
            required
          />
        </div>

        <div id="verify-otp-status" class="status-message"></div>

        <button type="submit" class="primary-button">Verify code</button>
      </form>

      <div class="auth-footer">
        Didn’t receive a code?
        <button id="resend-otp-btn" class="link-button">Resend OTP</button>
        <span id="resend-timer" class="resend-timer"></span>
      </div>
    </div>

    <script src="js/auth.js"></script>
  </body>
</html>

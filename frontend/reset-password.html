<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - Auth System</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/x-icon" href="logo/logo1.ico?v=1" />
    <link rel="shortcut icon" type="image/x-icon" href="logo/logo1.ico?v=1" />

    <!-- Meta tags for social media sharing (Open Graph) -->
    <meta property="og:title" content="Auth System - Secure Login" />
    <meta
      property="og:description"
      content="A secure authentication system with OTP verification."
    />
    <meta
      property="og:image"
      content="https://signin-portal.vercel.app/logo/logo1.ico"
    />
    <meta property="og:url" content="https://signin-portal.vercel.app/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Auth System - Secure Login" />
    <meta
      name="twitter:description"
      content="A secure authentication system with OTP verification."
    />
    <meta
      name="twitter:image"
      content="https://signin-portal.vercel.app/logo/logo1.png"
    />
  </head>
  <body data-page="reset-password">
    <div class="auth-container">
      <h1 class="auth-title">Create a new password</h1>
      <p class="auth-subtitle">
        Choose a strong password that you haven't used before.
      </p>

      <form id="reset-password-form" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="newPassword">New password</label>
          <div class="password-container">
            <input
              type="password"
              id="newPassword"
              name="newPassword"
              class="form-input"
              placeholder="At least 6 characters"
              required
            />
            <button
              type="button"
              class="password-toggle"
              data-toggle="newPassword"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                />
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword"
            >Confirm password</label
          >
          <div class="password-container">
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              class="form-input"
              placeholder="Repeat your new password"
              required
            />
            <button
              type="button"
              class="password-toggle"
              data-toggle="confirmPassword"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                />
              </svg>
            </button>
          </div>
        </div>

        <div id="reset-status" class="status-message"></div>

        <button type="submit" class="primary-button">Reset password</button>
      </form>

      <div class="auth-footer">
        Remembered your password?
        <a href="login.html" class="secondary-link">Back to sign in</a>
      </div>
    </div>

    <script src="js/auth.js"></script>
  </body>
</html>
